<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>전화번호부</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0f0f0f;color:#f0f0f0;font-family:'Noto Sans KR',sans-serif;font-size:14px}header{padding:20px 32px;border-bottom:1px solid #2e2e2e;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(15,15,15,.96);z-index:100}.logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700}.dot{width:8px;height:8px;border-radius:50%;background:#00e5a0;box-shadow:0 0 10px #00e5a0}.pill{background:#242424;border:1px solid #2e2e2e;border-radius:20px;padding:4px 14px;font-size:12px;color:#888;font-family:'DM Mono',monospace}.pill span{color:#00e5a0}main{max-width:1100px;margin:0 auto;padding:28px 32px}.toolbar{display:flex;gap:10px;margin-bottom:20px}.sw{flex:1;position:relative}.sw svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none}input,select,textarea{background:#1a1a1a;border:1px solid #2e2e2e;color:#f0f0f0;border-radius:8px;padding:9px 12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;width:100%}input:focus,select:focus,textarea:focus{border-color:#00e5a0}.sw input{padding-left:36px}select{width:auto;cursor:pointer}.btn{padding:9px 18px;border-radius:8px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px}.bp{background:#00e5a0;color:#000}.bp:hover{background:#00ffb3}.bg{background:#242424;color:#888;border:1px solid #2e2e2e}.bg:hover{border-color:#00e5a0;color:#00e5a0}.bd{background:rgba(255,77,109,.12);color:#ff4d6d;border:1px solid transparent}.bd:hover{border-color:#ff4d6d}.bs{padding:5px 10px;font-size:12px;border-radius:6px}.groups{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}.gt{padding:5px 14px;border-radius:20px;border:1px solid #2e2e2e;background:transparent;color:#888;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}.gt.active,.gt:hover{border-color:#00e5a0;color:#00e5a0;background:rgba(0,229,160,.12)}table{width:100%;border-collapse:collapse}thead th{text-align:left;font-size:11px;color:#555;letter-spacing:.8px;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid #2e2e2e}tbody tr{border-bottom:1px solid #2e2e2e}tbody tr:hover{background:#242424}tbody td{padding:13px 14px;vertical-align:middle}.av{width:34px;height:34px;border-radius:50%;background:rgba(0,229,160,.12);border:1px solid rgba(0,229,160,.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#00e5a0;flex-shrink:0}.nc{display:flex;align-items:center;gap:10px}.nt{font-weight:500}.mt{font-size:12px;color:#888;margin-top:2px}.pt{font-family:'DM Mono',monospace;font-size:13px}.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;background:#242424;color:#888;border:1px solid #2e2e2e}.dt{font-size:12px;color:#555;font-family:'DM Mono',monospace}.actions{display:flex;gap:6px}.empty{text-align:center;padding:60px 20px;color:#555}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}.modal-overlay.open{display:flex}.modal{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:14px;padding:28px;width:100%;max-width:420px;margin:16px}.modal h2{font-size:16px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}.modal h2::before{content:'';width:3px;height:18px;background:#00e5a0;border-radius:2px;display:block}.fg{margin-bottom:14px}.fg label{display:block;font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}textarea{resize:vertical;min-height:70px}.mf{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}.toast{position:fixed;bottom:28px;right:28px;background:#1a1a1a;border:1px solid #00e5a0;color:#00e5a0;padding:12px 18px;border-radius:10px;font-size:13px;z-index:999;transform:translateY(20px);opacity:0;transition:all .25s}.toast.show{transform:translateY(0);opacity:1}.toast.err{border-color:#ff4d6d;color:#ff4d6d}.loading{text-align:center;padding:40px;color:#888}@keyframes spin{to{transform:rotate(360deg)}}.spinner{display:inline-block;width:16px;height:16px;border:2px solid #2e2e2e;border-top-color:#00e5a0;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}.eb{background:rgba(255,77,109,.12);border:1px solid #ff4d6d;border-radius:10px;padding:16px 20px;margin-bottom:20px;font-size:13px;color:#ff4d6d;display:none}</style></head><body><header><div class="logo"><div class="dot"></div>전화번호부</div><div style="display:flex;align-items:center;gap:10px"><div class="pill">총 <span id="tc">0</span>명</div><button class="btn bp" onclick="openModal()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>연락처 추가</button></div></header><main><div id="eb" class="eb"></div><div class="toolbar"><div class="sw"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="search" placeholder="이름 또는 전화번호 검색..." oninput="render()"></div><select id="sort" onchange="render()"><option value="created_at-desc">최신순</option><option value="name-asc">이름순</option><option value="group_name-asc">그룹순</option></select></div><div class="groups" id="gtabs"></div><div id="tw"><div class="loading"><span class="spinner"></span>불러오는 중...</div></div></main><div class="modal-overlay" id="modal"><div class="modal"><h2 id="mt">연락처 추가</h2><input type="hidden" id="eid"><div class="fg"><label>이름 *</label><input type="text" id="fn" placeholder="홍길동"></div><div class="fg"><label>전화번호 *</label><input type="tel" id="fp" placeholder="010-0000-0000"></div><div class="fg"><label>그룹</label><input type="text" id="fg" placeholder="가족, 친구, 직장..." list="gl"><datalist id="gl"></datalist></div><div class="fg"><label>메모</label><textarea id="fm" placeholder="메모를 입력하세요"></textarea></div><div class="mf"><button class="btn bg" onclick="closeModal()">취소</button><button class="btn bp" onclick="save()">저장</button></div></div></div><div class="toast" id="toast"></div><script>const SB='https://crjqzlaptijucjytaahn.supabase.co/rest/v1',KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyanF6bGFwdGlqdWNqeXRhYWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjYwMTYsImV4cCI6MjA5NTM0MjAxNn0.lrK8bcXMbLfMbaTWqKwaYI0MCgsekF8qF6q-3y-hAgc',H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};let data=[],ag='전체';async function req(p,m='GET',b=null){const o={method:m,headers:H};if(b)o.body=JSON.stringify(b);const r=await fetch(SB+p,o);if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||r.statusText)}return r.status===204?null:r.json()}async function load(){try{data=await req('/contacts?select=*&order=created_at.desc')||[];document.getElementById('tc').textContent=data.length;document.getElementById('eb').style.display='none';tabs();render()}catch(e){const b=document.getElementById('eb');b.style.display='block';b.textContent='오류: '+e.message;document.getElementById('tw').innerHTML=''}}function tabs(){const w=document.getElementById('gtabs'),dl=document.getElementById('gl'),gs=['전체',...new Set(data.map(c=>c.group_name||'기타'))];w.innerHTML=gs.map(g=>`<button class="gt ${g===ag?'active':''}" onclick="sg('${g}')">${g}${g!=='전체'?` <span style="opacity:.5">${data.filter(c=>(c.group_name||'기타')===g).length}</span>`:''}</button>`).join('');dl.innerHTML=[...new Set(data.map(c=>c.group_name||'기타'))].map(g=>`<option value="${g}">`).join('')}function sg(g){ag=g;tabs();render()}function render(){const q=document.getElementById('search').value.toLowerCase(),[sk,sd]=document.getElementById('sort').value.split('-');let rows=data.filter(c=>(ag==='전체'||(c.group_name||'기타')===ag)&&(!q||c.name.toLowerCase().includes(q)||(c.phone||'').includes(q)));rows.sort((a,b)=>{let va=a[sk]||'',vb=b[sk]||'';return sd==='asc'?va.localeCompare(vb):vb.localeCompare(va)});const w=document.getElementById('tw');if(!rows.length){w.innerHTML='<div class="empty"><p>연락처가 없습니다</p></div>';return}w.innerHTML=`<table><thead><tr><th>이름</th><th>전화번호</th><th>그룹</th><th>등록일</th><th></th></tr></thead><tbody>${rows.map(c=>`<tr><td><div class="nc"><div class="av">${c.name.charAt(0)}</div><div><div class="nt">${c.name}</div>${c.memo?`<div class="mt">${c.memo}</div>`:''}</div></div></td><td><div class="pt">${c.phone}</div></td><td><span class="badge">${c.group_name||'기타'}</span></td><td><div class="dt">${new Date(c.created_at).toLocaleDateString('ko-KR')}</div></td><td><div class="actions"><button class="btn bg bs" onclick="edit('${c.id}')">수정</button><button class="btn bd bs" onclick="del('${c.id}')">삭제</button></div></td></tr>`).join('')}</tbody></table>`}function openModal(){document.getElementById('mt').textContent=document.getElementById('eid').value?'연락처 수정':'연락처 추가';document.getElementById('modal').classList.add('open')}function closeModal(){document.getElementById('modal').classList.remove('open');['eid','fn','fp','fg','fm'].forEach(i=>document.getElementById(i).value='')}function edit(id){const c=data.find(x=>x.id===id);if(!c)return;document.getElementById('eid').value=c.id;document.getElementById('fn').value=c.name;document.getElementById('fp').value=c.phone;document.getElementById('fg').value=c.group_name||'';document.getElementById('fm').value=c.memo||'';document.getElementById('mt').textContent='연락처 수정';document.getElementById('modal').classList.add('open')}async function save(){const id=document.getElementById('eid').value,name=document.getElementById('fn').value.trim(),phone=document.getElementById('fp').value.trim(),group_name=document.getElementById('fg').value.trim()||'기타',memo=document.getElementById('fm').value.trim();if(!name||!phone){toast('이름과 전화번호는 필수입니다',true);return}try{if(id)await req(`/contacts?id=eq.${id}`,'PATCH',{name,phone,group_name,memo});else await req('/contacts','POST',{name,phone,group_name,memo});closeModal();load();toast(id?'수정되었습니다':'저장되었습니다')}catch(e){toast('실패: '+e.message,true)}}async function del(id){if(!confirm('정말 삭제할까요?'))return;try{await req(`/contacts?id=eq.${id}`,'DELETE');load();toast('삭제되었습니다')}catch(e){toast('삭제 실패: '+e.message,true)}}function toast(msg,err){const t=document.getElementById('toast');t.textContent=(err?'✕ ':'✓ ')+msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2800)}document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()});load();</script></body></html>
