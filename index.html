<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전화번호 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.12);
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --danger: #ff4d6d;
    --danger-dim: rgba(255,77,109,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; min-height: 100vh; }
  header { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(15,15,15,0.96); backdrop-filter: blur(8px); z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .stat-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 14px; font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .stat-pill span { color: var(--accent); font-weight: 500; }
  main { max-width: 1100px; margin: 0 auto; padding: 28px 32px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
  input, select, textarea { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; outline: none; transition: border-color 0.15s; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .search-wrap input { padding-left: 36px; }
  select { cursor: pointer; width: auto; }
  select option { background: #1a1a1a; }
  .btn { padding: 9px 18px; border-radius: 8px; border: none; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #00ffb3; }
  .btn-ghost { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--danger-dim); color: var(--danger); border: 1px solid transparent; }
  .btn-danger:hover { border-color: var(--danger); }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
  .groups { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .group-tag { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; }
  .group-tag.active, .group-tag:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text-dim); letter-spacing: 0.8px; text-transform: uppercase; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 13px 14px; vertical-align: middle; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent-dim); border: 1px solid rgba(0,229,160,0.3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
  .name-cell { display: flex; align-items: center; gap: 10px; }
  .name-text { font-weight: 500; }
  .memo-text { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .phone-text { font-family: 'DM Mono', monospace; font-size: 13px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .date-text { font-size: 12px; color: var(--text-dim); font-family: 'DM Mono', monospace; }
  .actions { display: flex; gap: 6px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-state p { margin-top: 10px; font-size: 13px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 420px; margin: 16px; }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .modal h2::before { content: ''; width: 3px; height: 18px; background: var(--accent); border-radius: 2px; display: block; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  textarea { resize: vertical; min-height: 70px; }
  .modal-footer { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--surface); border: 1px solid var(--accent); color: var(--accent); padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 999; transform: translateY(20px); opacity: 0; transition: all 0.25s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  .error-box { background: var(--danger-dim); border: 1px solid var(--danger); border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; font-size: 13px; color: var(--danger); display: none; }
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>전화번호부</div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="stat-pill">총 <span id="total-count">0</span>명</div>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      연락처 추가
    </button>
  </div>
</header>
<main>
  <div id="error-box" class="error-box"></div>
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="이름 또는 전화번호 검색..." oninput="renderTable()">
    </div>
    <select id="sort-select" onchange="renderTable()">
      <option value="created_at-desc">최신순</option>
      <option value="name-asc">이름순</option>
      <option value="group_name-asc">그룹순</option>
    </select>
  </div>
  <div class="groups" id="group-tabs"></div>
  <div id="table-wrap"><div class="loading"><span class="spinner"></span>불러오는 중...</div></div>
</main>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">연락처 추가</h2>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label>이름 *</label><input type="text" id="f-name" placeholder="홍길동"></div>
    <div class="form-group"><label>전화번호 *</label><input type="tel" id="f-phone" placeholder="010-0000-0000"></div>
    <div class="form-group"><label>그룹</label><input type="text" id="f-group" placeholder="가족, 친구, 직장..." list="group-list"><datalist id="group-list"></datalist></div>
    <div class="form-group"><label>메모</label><textarea id="f-memo" placeholder="메모를 입력하세요"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveContact()">저장</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const URL = 'https://crjqzlaptijucjytaahn.supabase.co/rest/v1';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyanF6bGFwdGlqdWNqeXRhYWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjYwMTYsImV4cCI6MjA5NTM0MjAxNn0.lrK8bcXMbLfMbaTWqKwaYI0MCgsekF8qF6q-3y-hAgc';
const HEADERS = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
let contacts = [];
let activeGroup = '전체';
async function api(path, method='GET', body=null) {
  const opts = { method, headers: HEADERS };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(URL + path, opts);
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.message || err.hint || res.statusText); }
  if (res.status === 204) return null;
  return res.json();
}
async function load() {
  try {
    const data = await api('/contacts?select=*&order=created_at.desc');
    contacts = data || [];
    document.getElementById('total-count').textContent = contacts.length;
    document.getElementById('error-box').style.display = 'none';
    updateGroupTabs();
    renderTable();
  } catch(e) {
    const box = document.getElementById('error-box');
    box.style.display = 'block';
    box.textContent = '오류: ' + e.message;
    document.getElementById('table-wrap').innerHTML = '';
  }
}
function getGroups() { return ['전체', ...new Set(contacts.map(c => c.group_name || '기타'))]; }
function updateGroupTabs() {
  const wrap = document.getElementById('group-tabs');
  const dl = document.getElementById('group-list');
  wrap.innerHTML = getGroups().map(g => {
    const cnt = g === '전체' ? '' : ` <span style="opacity:0.5">${contacts.filter(c=>(c.group_name||'기타')===g).length}</span>`;
    return `<button class="group-tag ${g===activeGroup?'active':''}" onclick="setGroup('${g}')">${g}${cnt}</button>`;
  }).join('');
  dl.innerHTML = [...new Set(contacts.map(c=>c.group_name||'기타'))].map(g=>`<option value="${g}">`).join('');
}
function setGroup(g) { activeGroup = g; updateGroupTabs(); renderTable(); }
function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const [sortKey, sortDir] = document.getElementById('sort-select').value.split('-');
  let rows = contacts.filter(c => {
    const matchGroup = activeGroup === '전체' || (c.group_name||'기타') === activeGroup;
    const matchQ = !q || c.name.toLowerCase().includes(q) || (c.phone||'').includes(q);
    return matchGroup && matchQ;
  });
  rows.sort((a,b) => { let va = a[sortKey]||'', vb = b[sortKey]||''; return sortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va); });
  const wrap = document.getElementById('table-wrap');
  if (!rows.length) { wrap.innerHTML = `<div class="empty-state"><p>연락처가 없습니다</p></div>`; return; }
  wrap.innerHTML = `<table><thead><tr><th>이름</th><th>전화번호</th><th>그룹</th><th>등록일</th><th></th></tr></thead><tbody>${rows.map(c=>`<tr><td><div class="name-cell"><div class="avatar">${c.name.charAt(0)}</div><div><div class="name-text">${c.name}</div>${c.memo?`<div class="memo-text">${c.memo}</div>`:''}</div></div></td><td><div class="phone-text">${c.phone}</div></td><td><span class="badge">${c.group_name||'기타'}</span></td><td><div class="date-text">${new Date(c.created_at).toLocaleDateString('ko-KR')}</div></td><td><div class="actions"><button class="btn btn-ghost btn-sm" onclick="editContact('${c.id}')">수정</button><button class="btn btn-danger btn-sm" onclick="deleteContact('${c.id}')">삭제</button></div></td></tr>`).join('')}</tbody></table>`;
}
function openModal() { document.getElementById('modal-title').textContent = document.getElementById('edit-id').value ? '연락처 수정' : '연락처 추가'; document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); ['edit-id','f-name','f-phone','f-group','f-memo'].forEach(id=>document.getElementById(id).value=''); }
function editContact(id) {
  const c = contacts.find(x=>x.id===id); if(!c) return;
  document.getElementById('edit-id').value = c.id;
  document.getElementById('f-name').value = c.name;
  document.getElementById('f-phone').value = c.phone;
  document.getElementById('f-group').value = c.group_name||'';
  document.getElementById('f-memo').value = c.memo||'';
  document.getElementById('modal-title').textContent = '연락처 수정';
  document.getElementById('modal').classList.add('open');
}
async function saveContact() {
  const id = document.getElementById('edit-id').value;
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const group_name = document.getElementById('f-group').value.trim()||'기타';
  const memo = document.getElementById('f-memo').value.trim();
  if (!name||!phone) { showToast('이름과 전화번호는 필수입니다', true); return; }
  try {
    if (id) { await api(`/contacts?id=eq.${id}`, 'PATCH', {name,phone,group_name,memo}); showToast('수정되었습니다'); }
    else { await api('/contacts', 'POST', {name,phone,group_name,memo}); showToast('저장되었습니다'); }
    closeModal(); load();
  } catch(e) { showToast('실패: '+e.message, true); }
}
async function deleteContact(id) {
  if (!confirm('정말 삭제할까요?')) return;
  try { await api(`/contacts?id=eq.${id}`, 'DELETE'); showToast('삭제되었습니다'); load(); }
  catch(e) { showToast('삭제 실패: '+e.message, true); }
}
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = (isError?'✕ ':'✓ ') + msg;
  t.className = 'toast show' + (isError?' error':'');
  setTimeout(()=>t.className='toast', 2800);
}
document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) closeModal(); });
load();
</script>
</body>
</html>
